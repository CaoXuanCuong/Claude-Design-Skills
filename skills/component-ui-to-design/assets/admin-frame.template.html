<!doctype html>
<html><head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<!-- Co-located in the DS project (../../../ → project root). Depth assumes
     components/<group>/<Name>/<Name>.html -->
<link rel="stylesheet" href="../../../_ds_bundle.css">
<link rel="stylesheet" href="../../../app-ui/app-ui.css">
<style>
  :root{--tb:#1a1a1a;--sb:#ebebeb;--bd:#f1f1f1}
  html,body{margin:0!important;padding:0!important;background:var(--bd)!important;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .ad-top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--tb);display:flex;align-items:center;z-index:50;color:#e3e3e3}
  .ad-top .brand{width:224px;display:flex;align-items:center;gap:8px;padding-left:16px;flex:none}
  .ad-top .brand .wm{font-weight:650;font-size:19px;color:#fff;letter-spacing:-.02em}
  .ad-top .brand .season{font-style:italic;font-size:12px;color:#b5b5b5;border-left:1px solid #4a4a4a;padding-left:8px;margin-left:2px}
  .ad-top .search{flex:1;max-width:480px;margin:0 auto;display:flex;align-items:center;gap:8px;height:32px;background:#303030;border:1px solid #444;border-radius:8px;padding:0 10px;color:#9e9e9e;font-size:13px}
  .ad-top .search svg{opacity:.8}
  .ad-top .search .kbd{margin-left:auto;font-size:11px;color:#9e9e9e;border:1px solid #4a4a4a;border-radius:5px;padding:1px 6px}
  .ad-top .right{display:flex;align-items:center;gap:6px;margin-left:auto;padding-right:14px}
  .ad-top .ibtn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#c9c9c9}
  .ad-top .ibtn:hover{background:#2e2e2e}
  .ad-top .acct{display:flex;align-items:center;gap:8px;padding:3px 8px 3px 3px;border-radius:8px}
  .ad-top .acct:hover{background:#2e2e2e}
  .ad-top .acct .av{width:26px;height:26px;border-radius:7px;background:#9be0ff;color:#00527c;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center}
  .ad-top .acct .nm{font-size:13px;color:#e3e3e3}
  .ad-top .acct .badge{font-size:11px;color:#c9c9c9;background:#3a3a3a;border-radius:5px;padding:1px 6px}
  .ad-side{position:fixed;top:56px;left:0;bottom:0;width:240px;background:var(--sb);display:flex;flex-direction:column;padding:12px 12px 8px;box-sizing:border-box;overflow:hidden;z-index:40}
  .ad-side .scroll{flex:1;overflow:auto}
  .ad-side .nav{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;color:#303030;text-decoration:none;font-size:14px;line-height:20px}
  .ad-side .nav svg{color:#4a4a4a;flex:none}
  .ad-side .nav:hover{background:rgba(0,0,0,.06)}
  .ad-side .nav.active{background:#fff;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.08);position:relative}
  .ad-side .nav.active .dot{position:absolute;right:10px;width:6px;height:6px;border-radius:50%;background:#4a4a4a}
  .ad-side .sec{display:flex;align-items:center;gap:4px;color:#616161;font-size:12px;font-weight:600;padding:14px 8px 4px}
  .ad-side .sec svg{opacity:.6}
  .ad-side .bottom{border-top:1px solid #dcdcdc;padding-top:6px}
  .ad-main{margin-left:240px;margin-top:56px;min-height:calc(100vh - 56px)}
  .ad-host{display:flex;align-items:center;gap:10px;padding:14px 20px}
  .ad-host .appicon{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#5b47e0,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
  .ad-host .t{font-size:16px;font-weight:650;color:#202223}
  .ad-host .more{margin-left:auto;color:#616161;font-size:20px;line-height:1;padding:4px 8px;border-radius:8px}
  .ad-host .more:hover{background:rgba(0,0,0,.06)}
  #app-root{padding:0 20px 40px}
</style>
</head>
